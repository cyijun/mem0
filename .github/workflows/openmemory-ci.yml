name: OpenMemory CI

on:
  push:
    branches: [main, master]
    paths:
      - 'openmemory/**'
      - '.github/workflows/openmemory-ci.yml'
  pull_request:
    paths:
      - 'openmemory/**'

jobs:
  lint-and-test-api:
    name: Lint & Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openmemory/api
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('openmemory/api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff mypy
      
      - name: Run Ruff linter
        run: |
          ruff check app/ --output-format=github
        continue-on-error: true
      
      - name: Run Ruff formatter check
        run: |
          ruff format app/ --check
        continue-on-error: true
      
      - name: Type check with mypy
        run: |
          mypy app/ --ignore-missing-imports --show-error-codes
        continue-on-error: true
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=xml
        env:
          DATABASE_URL: sqlite:///./test.db
          OPENAI_API_KEY: sk-test-key
        continue-on-error: true

  build-and-test-docker:
    name: Build & Test Docker
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      - name: Create env files
        run: |
          cd openmemory/api && cp .env.example .env || echo "OPENAI_API_KEY=test-key" > .env
          cd ../ui && cp .env.example .env || echo "NEXT_PUBLIC_API_URL=http://localhost:8765" > .env
      
      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: openmemory/api
          push: false
          load: true
          tags: mem0/openmemory-mcp:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      
      - name: Build UI Docker image
        uses: docker/build-push-action@v5
        with:
          context: openmemory/ui
          push: false
          load: true
          tags: mem0/openmemory-ui:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  lint-ui:
    name: Lint UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openmemory/ui
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: openmemory/ui/pnpm-lock.yaml
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        run: pnpm lint || echo "No lint script"
        continue-on-error: true
      
      - name: Type check
        run: pnpm tsc --noEmit || echo "TypeScript check failed"
        continue-on-error: true
      
      - name: Build check
        run: pnpm build || echo "Build check failed"
        continue-on-error: true

  code-quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for common issues
        run: |
          echo "🔍 Checking for common code issues..."
          
          # Check for hardcoded credentials
          if grep -r "sk-" openmemory/api/app/ --include="*.py" | grep -v ".pyc" | grep -v "test" | head -5; then
            echo "⚠️ Warning: Possible hardcoded API keys found"
          fi
          
          # Check for debug print statements
          if grep -r "print(" openmemory/api/app/ --include="*.py" | grep -v "__pycache__" | head -5; then
            echo "ℹ️ Note: Found print statements (consider using logging)"
          fi
          
          # Check for TODO/FIXME comments
          echo "📋 TODO/FIXME comments:"
          grep -r "TODO\|FIXME" openmemory/ --include="*.py" --include="*.ts" --include="*.tsx" | head -10 || echo "None found"
        continue-on-error: true
